services:
  postgres:
    ports:
      - "${POSTGRES_PORT:-5432}:5432"

  redis:
    ports:
      - "${REDIS_PORT:-6379}:6379"

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${API_HTTP_PORT:-5000}:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Staging
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      ConnectionStrings__Redis: redis:6379
      Jwt__Key: ${JWT__KEY}
      Jwt__Issuer: ${JWT__ISSUER}
      Jwt__Audience: ${JWT__AUDIENCE}
      Jwt__AccessTokenExpirationMinutes: ${JWT__ACCESSTOKENEXPIRATIONMINUTES}
      Jwt__RefreshTokenExpirationDays: ${JWT__REFRESHTOKENEXPIRATIONDAYS}
      YandexCloudPostbox__Enabled: ${YANDEXCLOUDPOSTBOX__ENABLED}
      YandexCloudPostbox__Endpoint: ${YANDEXCLOUDPOSTBOX__ENDPOINT}
      YandexCloudPostbox__FromEmail: ${YANDEXCLOUDPOSTBOX__FROMEMAIL}
      YandexCloudPostbox__IamToken: ${YANDEXCLOUDPOSTBOX__IAMTOKEN}
      YandexCloudPostbox__AccessKeyId: ${YANDEXCLOUDPOSTBOX__ACCESSKEYID}
      YandexCloudPostbox__SecretAccessKey: ${YANDEXCLOUDPOSTBOX__SECRETACCESSKEY}
      YandexCloudPostbox__Region: ${YANDEXCLOUDPOSTBOX__REGION}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - geolink-network
    restart: unless-stopped
